spring:
  application:
    name: platform

  datasource:
    url: jdbc:mysql://localhost:3306/pdf2data_db_new?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false


  spring:
    servlet:
      multipart:
        max-file-size: 25MB
        max-request-size: 25MB

  data:
    mongodb:
      uri: mongodb://localhost:27017/pdf2data_nosql

gemini:
  api:
    key:
    model: gemini-2.5-flash


server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG